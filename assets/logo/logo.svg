<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="256" fill="url(#gradient1)"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient1" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="gradient2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
  </defs>
  
  <!-- Circular Loading Arrows -->
  <g transform="translate(256, 256)">
    <!-- Arrow 1 (Top Right) -->
    <path d="M 60 -80 A 100 100 0 0 1 100 -40 L 85 -50 L 95 -30 L 110 -45 Z" 
          fill="white" opacity="0.9"/>
    
    <!-- Arrow 2 (Bottom Right) -->
    <path d="M 80 60 A 100 100 0 0 1 40 100 L 50 85 L 30 95 L 45 110 Z" 
          fill="white" opacity="0.9"/>
    
    <!-- Arrow 3 (Bottom Left) -->
    <path d="M -60 80 A 100 100 0 0 1 -100 40 L -85 50 L -95 30 L -110 45 Z" 
          fill="white" opacity="0.9"/>
    
    <!-- Arrow 4 (Top Left) -->
    <path d="M -80 -60 A 100 100 0 0 1 -40 -100 L -50 -85 L -30 -95 L -45 -110 Z" 
          fill="white" opacity="0.9"/>
  </g>
  
  <!-- Letter S in the center -->
  <text x="256" y="320" 
        font-family="Arial, sans-serif" 
        font-size="200" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle">S</text>
</svg>
